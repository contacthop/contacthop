name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest -q

      - name: Build distributions
        run: uv build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t contacthop .

  # Graph-memory integration: the FalkorDB store against a real instance.
  falkordb:
    runs-on: ubuntu-latest
    services:
      falkordb:
        image: falkordb/falkordb:latest
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      CONTACTHOP_TEST_FALKORDB_HOST: localhost
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra falkordb
      - name: Run FalkorDB integration tests
        run: uv run pytest tests/test_falkordb.py -q

  # Proves the production path: migrate a real Postgres, boot with
  # auto_create_tables=false, and exercise the write path.
  postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: contacthop
          POSTGRES_PASSWORD: contacthop
          POSTGRES_DB: contacthop
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U contacthop"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      CONTACTHOP_DATABASE_URL: postgresql+asyncpg://contacthop:contacthop@localhost:5432/contacthop
      CONTACTHOP_AUTO_CREATE_TABLES: "false"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra postgres
      - name: Run migrations against Postgres
        run: uv run contacthop migrate
      - name: Boot and smoke test
        run: |
          uv run contacthop serve --port 8000 &
          for i in $(seq 1 20); do curl -sf localhost:8000/health && break; sleep 1; done
          curl -sf localhost:8000/v1/contacts \
            -H 'content-type: application/json' \
            -d '{"identities":[{"channel":"sms","address":"+15550001111"}]}'
          curl -sf -X POST localhost:8000/webhooks/twilio/sms \
            -d 'From=%2B15550001111&To=%2B15550000000&Body=hello'
