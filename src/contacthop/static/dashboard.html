<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ContactHop — Command Center</title>
<style>
  :root {
    --page: #f9f9f7; --surface: #fcfcfb;
    --ink: #0b0b0b; --ink-2: #52514e; --ink-3: #898781;
    --hairline: rgba(11,11,11,0.10); --grid: #e1e0d9;
    --ch-sms: #2a78d6; --ch-email: #1baf7a; --ch-voice: #eda100;
    --good: #0ca30c; --critical: #d03b3b;
    --wash: rgba(11,11,11,0.04);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --page: #0d0d0d; --surface: #1a1a19;
      --ink: #ffffff; --ink-2: #c3c2b7; --ink-3: #898781;
      --hairline: rgba(255,255,255,0.10); --grid: #2c2c2a;
      --ch-sms: #3987e5; --ch-email: #199e70; --ch-voice: #c98500;
      --good: #0ca30c; --critical: #d03b3b;
      --wash: rgba(255,255,255,0.06);
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 14px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--page); color: var(--ink); height: 100vh;
    display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 10px 16px;
    border-bottom: 1px solid var(--hairline); background: var(--surface);
  }
  header h1 { font-size: 15px; font-weight: 650; }
  header .sub { color: var(--ink-3); font-size: 12px; }
  header .spacer { flex: 1; }
  #health { font-size: 12px; color: var(--ink-2); }
  #health .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--ink-3); margin-right: 5px; }
  #health.ok .dot { background: var(--good); }
  #key {
    width: 180px; padding: 5px 8px; font: inherit; font-size: 12px;
    border: 1px solid var(--hairline); border-radius: 6px;
    background: var(--page); color: var(--ink);
  }
  #tiles { display: flex; gap: 10px; padding: 12px 16px 0; }
  .tile {
    background: var(--surface); border: 1px solid var(--hairline); border-radius: 8px;
    padding: 10px 14px; min-width: 130px;
  }
  .tile .v { font-size: 22px; font-weight: 650; }
  .tile .l { font-size: 12px; color: var(--ink-2); margin-top: 1px; }
  main { flex: 1; display: flex; gap: 12px; padding: 12px 16px 16px; min-height: 0; }
  #list {
    width: 320px; flex-shrink: 0; overflow-y: auto;
    background: var(--surface); border: 1px solid var(--hairline); border-radius: 8px;
  }
  .conv {
    padding: 10px 12px; border-bottom: 1px solid var(--grid); cursor: pointer;
  }
  .conv:hover { background: var(--wash); }
  .conv.sel { background: var(--wash); box-shadow: inset 3px 0 0 var(--ink); }
  .conv .who { font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .conv .goal { color: var(--ink-2); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .conv .meta { color: var(--ink-3); font-size: 11px; margin-top: 2px; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px; font-size: 11px;
    color: var(--ink-2); border: 1px solid var(--hairline); border-radius: 999px;
    padding: 1px 8px 1px 6px; background: var(--surface);
  }
  .badge .dot { width: 7px; height: 7px; border-radius: 50%; }
  .dot.sms { background: var(--ch-sms); } .dot.email { background: var(--ch-email); } .dot.voice { background: var(--ch-voice); }
  #panel {
    flex: 1; min-width: 0; display: flex; flex-direction: column;
    background: var(--surface); border: 1px solid var(--hairline); border-radius: 8px;
  }
  #panelhead { padding: 10px 14px; border-bottom: 1px solid var(--grid); display: flex; align-items: center; gap: 8px; }
  #panelhead .who { font-weight: 650; }
  #panelhead .goal { color: var(--ink-2); font-size: 12px; }
  #timeline { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 68%; }
  .msg.inbound { align-self: flex-start; }
  .msg.outbound { align-self: flex-end; }
  .msg .bubble {
    padding: 8px 11px; border-radius: 10px; border: 1px solid var(--hairline);
    background: var(--surface); white-space: pre-wrap; word-break: break-word;
  }
  .msg.outbound .bubble { background: var(--wash); }
  .msg .tag { font-size: 11px; color: var(--ink-3); margin-top: 3px; display: flex; gap: 6px; align-items: center; }
  .msg.outbound .tag { justify-content: flex-end; }
  .tag .status.failed { color: var(--critical); font-weight: 600; }
  .tag .status.delivered { color: var(--good); }
  .event {
    align-self: center; color: var(--ink-3); font-size: 11.5px;
    border: 1px dashed var(--grid); border-radius: 999px; padding: 2px 12px;
    max-width: 85%; text-align: center;
  }
  #composer { display: flex; gap: 8px; padding: 10px 12px; border-top: 1px solid var(--grid); }
  #composer input[type=text] {
    flex: 1; padding: 8px 10px; font: inherit; border: 1px solid var(--hairline);
    border-radius: 8px; background: var(--page); color: var(--ink);
  }
  #composer select, #composer button {
    font: inherit; font-size: 13px; padding: 8px 10px; border-radius: 8px;
    border: 1px solid var(--hairline); background: var(--surface); color: var(--ink); cursor: pointer;
  }
  #composer button { font-weight: 600; }
  #composer button:hover { background: var(--wash); }
  .empty { color: var(--ink-3); text-align: center; margin: auto; padding: 30px; }
  #banner {
    display: none; margin: 12px 16px 0; padding: 8px 12px; font-size: 13px;
    border: 1px solid var(--critical); border-radius: 8px; color: var(--critical);
  }
</style>
</head>
<body>
<header>
  <h1>ContactHop</h1><span class="sub">command center</span>
  <span class="spacer"></span>
  <span id="health"><span class="dot"></span><span id="healthtext">connecting…</span></span>
  <input id="key" type="password" placeholder="API key (if configured)" autocomplete="off">
</header>
<div id="banner"></div>
<div id="tiles">
  <div class="tile"><div class="v" id="t-contacts">–</div><div class="l">Contacts</div></div>
  <div class="tile"><div class="v" id="t-active">–</div><div class="l">Active conversations</div></div>
  <div class="tile"><div class="v" id="t-total">–</div><div class="l">All conversations</div></div>
</div>
<main>
  <div id="list"><div class="empty">No conversations yet.</div></div>
  <div id="panel">
    <div id="panelhead"><span class="who">Select a conversation</span></div>
    <div id="timeline"><div class="empty">The unified transcript — SMS, email, and voice turns in one timeline — appears here.</div></div>
    <form id="composer">
      <input id="body" type="text" placeholder="Send as the agent…" autocomplete="off" disabled>
      <select id="channel" disabled>
        <option value="">auto (policy)</option>
        <option value="sms">sms</option>
        <option value="email">email</option>
        <option value="voice">voice</option>
      </select>
      <button type="submit" disabled>Send</button>
    </form>
  </div>
</main>
<script>
"use strict";
const $ = (id) => document.getElementById(id);
const state = { conversations: [], contacts: {}, selected: null, timer: null };

const keyInput = $("key");
keyInput.value = localStorage.getItem("contacthop_key") || "";
keyInput.addEventListener("change", () => {
  localStorage.setItem("contacthop_key", keyInput.value);
  refresh();
});

function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  })[c]);
}

async function api(path, options = {}) {
  const headers = { "content-type": "application/json", ...(options.headers || {}) };
  if (keyInput.value) headers["Authorization"] = "Bearer " + keyInput.value;
  const resp = await fetch(path, { ...options, headers });
  if (resp.status === 401) { banner("Unauthorized — enter a valid API key (top right)."); throw new Error("401"); }
  if (!resp.ok) {
    let detail = resp.statusText;
    try { detail = (await resp.json()).detail || detail; } catch {}
    throw new Error(detail);
  }
  banner(null);
  return resp.json();
}

function banner(text) {
  const el = $("banner");
  el.style.display = text ? "block" : "none";
  if (text) el.textContent = text;
}

function badge(channel) {
  return `<span class="badge"><span class="dot ${esc(channel)}"></span>${esc(channel)}</span>`;
}

function contactName(id) {
  const contact = state.contacts[id];
  if (!contact) return "Unknown contact";
  return contact.display_name || (contact.identities[0] && contact.identities[0].address) || "Unnamed";
}

function when(iso) {
  const date = new Date(iso.endsWith("Z") || iso.includes("+") ? iso : iso + "Z");
  return date.toLocaleString([], { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
}

async function refresh() {
  try {
    const [health, contacts, conversations] = await Promise.all([
      api("/health"), api("/v1/contacts?limit=500"), api("/v1/conversations?limit=200"),
    ]);
    $("health").className = "ok";
    $("healthtext").textContent = "v" + health.version;
    state.contacts = Object.fromEntries(contacts.map(c => [c.id, c]));
    state.conversations = conversations;
    $("t-contacts").textContent = contacts.length;
    $("t-active").textContent = conversations.filter(c => c.status === "active").length;
    $("t-total").textContent = conversations.length;
    renderList();
    if (state.selected) await loadTimeline(state.selected, true);
  } catch (err) { /* banner already shown */ }
}

function renderList() {
  const list = $("list");
  if (!state.conversations.length) {
    list.innerHTML = '<div class="empty">No conversations yet.</div>';
    return;
  }
  list.innerHTML = state.conversations.map(c => `
    <div class="conv ${c.id === state.selected ? "sel" : ""}" data-id="${c.id}">
      <div class="who">${esc(contactName(c.contact_id))} ${badge(c.current_channel)}</div>
      <div class="goal">${esc(c.goal || "(no goal)")}</div>
      <div class="meta">${esc(c.status)} · started ${when(c.created_at)}</div>
    </div>`).join("");
  list.querySelectorAll(".conv").forEach(el =>
    el.addEventListener("click", () => select(el.dataset.id)));
}

async function select(id) {
  state.selected = id;
  renderList();
  ["body", "channel"].forEach(x => $(x).disabled = false);
  document.querySelector("#composer button").disabled = false;
  await loadTimeline(id, false);
}

async function loadTimeline(id, keepScroll) {
  const conversation = state.conversations.find(c => c.id === id);
  if (conversation) {
    $("panelhead").innerHTML =
      `<span class="who">${esc(contactName(conversation.contact_id))}</span>` +
      badge(conversation.current_channel) +
      `<span class="goal">${esc(conversation.goal || "")}</span>`;
  }
  const [messages, events] = await Promise.all([
    api(`/v1/conversations/${id}/transcript`), api(`/v1/conversations/${id}/events`),
  ]);
  const entries = [
    ...messages.map(m => ({ at: m.created_at, kind: "msg", m })),
    ...events.map(e => ({ at: e.created_at, kind: "event", e })),
  ].sort((a, b) => a.at.localeCompare(b.at));

  const timeline = $("timeline");
  const stick = keepScroll ? timeline.scrollTop : null;
  timeline.innerHTML = entries.length ? entries.map(render).join("")
    : '<div class="empty">No messages yet — send one below.</div>';
  timeline.scrollTop = stick === null ? timeline.scrollHeight : stick;
}

function render(entry) {
  if (entry.kind === "event") {
    const { type, payload } = entry.e;
    let text = type;
    if (type === "channel_switch") text = `switched ${payload.from} → ${payload.to} — ${payload.reason}`;
    else if (type === "escalation") text = `escalation: no reply on ${payload.no_reply_on}, suggests ${payload.suggested_channel} (attempt ${payload.attempt})`;
    else if (payload && payload.note) text = payload.note;
    return `<div class="event">${esc(text)} · ${when(entry.at)}</div>`;
  }
  const { direction, channel, body, delivery_status } = entry.m;
  const who = direction === "inbound" ? "them" : "agent";
  const statusClass = delivery_status === "failed" ? "failed" : delivery_status === "delivered" ? "delivered" : "";
  const statusText = delivery_status === "failed" ? "✕ failed" : delivery_status;
  return `<div class="msg ${esc(direction)}">
    <div class="bubble">${esc(body)}</div>
    <div class="tag">${badge(channel)} <span>${who}</span>
      <span class="status ${statusClass}">${esc(statusText)}</span> <span>${when(entry.at)}</span></div>
  </div>`;
}

$("composer").addEventListener("submit", async (submitEvent) => {
  submitEvent.preventDefault();
  const body = $("body").value.trim();
  if (!body || !state.selected) return;
  const channel = $("channel").value || null;
  try {
    await api(`/v1/conversations/${state.selected}/messages`, {
      method: "POST", body: JSON.stringify({ body, channel }),
    });
    $("body").value = "";
    await loadTimeline(state.selected, false);
    await refresh();
  } catch (err) { banner("Send failed: " + err.message); }
});

refresh();
state.timer = setInterval(refresh, 5000);
</script>
</body>
</html>
