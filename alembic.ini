# Dev-time Alembic config (autogenerating new revisions from the repo).
# Deployments don't need this file — `contacthop migrate` configures Alembic
# programmatically from CONTACTHOP_DATABASE_URL.
#
#   uv run alembic revision --autogenerate -m "add my_table"
#   uv run alembic upgrade head

[alembic]
script_location = src/contacthop/db/migrations
# Leave sqlalchemy.url unset: env.py falls back to ContactHop settings
# (CONTACTHOP_DATABASE_URL / .env), keeping one source of truth.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
